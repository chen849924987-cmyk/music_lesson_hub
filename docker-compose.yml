# ============================================================
# Docker Compose 生产环境配置文件
# ============================================================
# 功能：一键启动完整项目（MySQL + Redis + MinIO + 后端 + 前端）
#
# 用法：
#   启动所有服务：    docker compose up -d
#   停止所有服务：    docker compose down
#   查看日志：       docker compose logs -f
#   重新构建并启动：  docker compose up -d --build
#   执行命令（如种子数据）： docker compose exec backend node dist/seeds/create-accounts.js
#
# 注意：
#   开发环境请使用本机运行的 MySQL/Redis/MinIO + npm run start:dev
#   生产环境才使用 docker compose
# ============================================================

version: '3.8'

services:
  # ==========================================
  # MySQL 数据库
  # ==========================================
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: music-edu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123456}
      MYSQL_DATABASE: ${DB_DATABASE:-music_edu}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      # 注意：如果本机已运行 MySQL，请使用不同端口避免冲突
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis 缓存
  # ==========================================
  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: music-edu-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123456}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================
  # MinIO 对象存储
  # ==========================================
  minio:
    image: docker.m.daocloud.io/minio/minio:latest
    container_name: music-edu-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      # 让 MinIO 生成的预签名 URL 使用 localhost，这样浏览器能直接访问
      MINIO_SERVER_URL: "http://localhost:9000"
    ports:
      - "${MINIO_PORT:-9000}:9000"           # API 端口
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # 控制台端口
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================
  # NestJS 后端应用
  # ==========================================
  backend:
    # 使用 Dockerfile 构建
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: music-edu-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    # 依赖服务（确保 MySQL/Redis/MinIO 先启动）
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    # 环境变量（覆盖 .env 中的配置）
    environment:
      # 开发/演示模式：自动创建数据库表
      NODE_ENV: development
      APP_PORT: 3000
      # 数据库 - 使用服务名而非 localhost
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root123456}
      DB_DATABASE: music_edu
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key-change-in-production}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      # MinIO - 后端内部用服务名访问 minio，生成的 URL 自动替换为 localhost 供浏览器使用
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: music-edu
      MINIO_USE_SSL: "false"
      # 支付宝沙箱配置（Docker 环境下 returnUrl 指向 Nginx 80 端口）
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-your-alipay-app-id}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-your-alipay-private-key}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-your-alipay-public-key}
      # Docker 下使用沙箱网关，returnUrl 指向 Nginx 80 端口
      ALIPAY_GATEWAY: https://openapi-sandbox.dl.alipaydev.com/gateway.do
      ALIPAY_NOTIFY_URL: http://localhost:3000/api/v1/payments/notify
      # 注意：如果开启了 Tailscale Funnel，请在上方设置 TAILSCALE_HOST。
      # return_url 会根据 TAILSCALE_HOST 自动适配，留空默认走 localhost。
      ALIPAY_RETURN_URL: http://localhost/payment/success
      
      # ==========================================
      # Tailscale Funnel 配置（可选）
      # ==========================================
      # 填写你的 Tailscale 设备域名，例如 "abc123.ts.net"
      # 留空 = 本机模式，填了 = Tailscale 外网访问模式
      # 配置 StorageService 会自动切换 MinIO URL 生成逻辑
      TAILSCALE_HOST: "your-tailscale-host.ts.net"
      # 文件上传限制
      UPLOAD_VIDEO_MAX_SIZE: "2048"
      UPLOAD_ATTACHMENT_MAX_SIZE: "100"
    volumes:
      # 可选：映射日志目录到宿主机
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ==========================================
  # Vue 前端应用（Nginx 托管）
  # ==========================================
  frontend:
    # 使用 Dockerfile 构建
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: music-edu-frontend
    restart: unless-stopped
    ports:
      # 映射到宿主机的 80 端口
      - "${FRONTEND_PORT:-80}:80"
    # 依赖后端服务
    depends_on:
      - backend
    environment:
      # Nginx 内部使用，指向后端服务
      BACKEND_HOST: backend
      BACKEND_PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

# ============================================
# 数据卷定义
# ============================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backend_logs:
    driver: local
