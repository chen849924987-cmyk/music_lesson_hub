# ============================================================
# Nginx 配置 - Vue 前端 + API 反向代理 + MinIO 文件代理
# ============================================================
# 此配置用于生产环境 Docker 容器
# 功能：
#   1. 托管 Vue 构建产物（静态文件）
#   2. 转发 /api/* 请求到后端服务
#   3. 代理 /minio-files/* 到 MinIO（解决 Tailscale 下 9000 端口不可访问问题）
#   4. 支持大文件上传（视频/附件）
#   5. 静态资源缓存策略
# ============================================================

# ============================================================
# 上游服务定义（用于 keepalive 连接池）
# ============================================================
# 定义后端和 MinIO 的上游服务器组，启用 keepalive 连接复用
# 减少 TCP 握手的开销，在 Tailscale 等高延迟网络环境下效果显著
upstream backend_upstream {
    server backend:3000;
    keepalive 32;
}

upstream minio_upstream {
    server minio:9000;
    keepalive 16;
}

server {
    # 监听 80 端口
    listen 80;
    
    # 服务器名称（支持所有域名，包括 localhost 和 Tailscale *.ts.net）
    server_name _;

    # 字符集
    charset utf-8;

    # 上传文件大小限制（支持最大 2GB 视频上传）
    client_max_body_size 2048M;

    # ============================================
    # Gzip 压缩
    # ============================================
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # ============================================
    # MinIO 文件代理（通过 80 端口访问 MinIO 文件）
    # 解决 Tailscale Funnel 下 9000 端口不可访问的问题
    # 使用 upstream keepalive 连接池减少握手延迟
    #
    # HTTP Range 请求支持（视频关键优化）：
    #   - 浏览器请求视频时，自动使用 Range 头按"分片"下载
    #   - 拖动进度条时只请求新分片，不用重新下载整个文件
    #   - Accept-Ranges: bytes 告诉浏览器服务器支持分片下载
    #   - 206 Partial Content 是 Range 请求的标准成功响应码
    #   - 此优化无需修改任何前端代码，Nginx 层面自动处理
    # ============================================
    location /minio-files/ {
        # 转发到 MinIO 容器（使用 upstream 启用 keepalive）
        proxy_pass http://minio_upstream/;
        
        # 请求头设置（启用 keepalive 连接复用）
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # ===== HTTP Range 请求支持（视频流式播放关键） =====
        # 显式转发 Range/If-Range 头，让 MinIO 正确处理分片请求
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_set_header If-Modified-Since $http_if_modified_since;
        proxy_set_header If-None-Match $http_if_none_match;
        
        # 通知浏览器服务器支持分片下载
        # 浏览器收到此头后，视频请求会使用 Range 分片方式
        add_header Accept-Ranges bytes;
        
        # 缓存策略：封面图片（24小时）+ 视频分片（206 也缓存）
        # 封面图片根据 URL 中的 ?t=时间戳 参数自动失效
        # 206 是 Range 请求的标准成功码，必须加入缓存策略
        proxy_cache_valid 200 206 24h;
        
        # 大文件支持（视频流等）
        # proxy_request_buffering off 允许请求体流式传输到后端
        # proxy_buffering off 允许响应体流式传输到客户端
        # 两者配合实现真正的视频流式播放
        proxy_request_buffering off;
        proxy_buffering off;
        
        # 超时设置（视频文件需要更长时间）
        proxy_connect_timeout 60s;
        proxy_read_timeout 86400s;  # 24小时（视频长时间播放）
        proxy_send_timeout 86400s;
    }

    # ============================================
    # 前端静态文件服务
    # ============================================
    location / {
        # 静态文件根目录
        root /usr/share/nginx/html;
        
        # 默认入口文件
        index index.html;
        
        # SPA 路由重定向：所有非文件请求都返回 index.html
        try_files $uri $uri/ /index.html;
        
        # 静态资源缓存策略
        # HTML 文件不缓存（确保每次都获取最新的）
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
        
        # JS/CSS 文件（Vite 构建时自带 hash，可以长期缓存）
        location ~* \.(js|css)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
        
        # 字体文件
        location ~* \.(woff2?|eot|ttf|otf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # 图片/图标
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================
    # API 请求反向代理
    # 使用 upstream keepalive 连接池，减少 TCP 握手延迟
    # ============================================
    location /api/ {
        # 转发到后端服务（使用 upstream 启用 keepalive）
        proxy_pass http://backend_upstream;
        
        # 设置代理请求头（启用 keepalive 连接复用）
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（升级请求单独处理）
        # 注意：keepalive 连接池与 WebSocket 不兼容，
        # 如果检测到 Upgrade 头，Connection 会被覆盖为 "upgrade"
        proxy_set_header Upgrade $http_upgrade;
        
        # 超时设置（大文件上传需要更长超时）
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        
        # 关闭缓存（API 请求需要实时性）
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ============================================
    # 健康检查端点
    # ============================================
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # 安全相关响应头
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # ============================================
    # 日志配置
    # ============================================
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
